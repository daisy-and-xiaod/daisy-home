<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小D · 家</title>
    <link rel="manifest" href="/manifest.json">
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Segoe UI','Noto Sans SC',sans-serif;background:#e5e5e5;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:16px}
.phone{width:375px;background:#fff;border-radius:32px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,0.08);position:relative;display:flex;flex-direction:column;max-height:780px}
.status-bar{display:flex;justify-content:space-between;padding:10px 20px 6px;font-size:12px;font-weight:600;color:#1a1a1a;background:#fff}
.header{display:flex;align-items:center;padding:6px 16px 10px;gap:8px;background:#fff}
.header-avatar{width:36px;height:36px;border-radius:50%;background:#f0f0f0;display:flex;align-items:center;justify-content:center;overflow:hidden;cursor:pointer;flex-shrink:0}
.header .name{font-size:17px;font-weight:700;color:#1a1a1a}
.header .status{font-size:11px;color:#6EC89B}
.header-icons{margin-left:auto;display:flex;gap:16px;font-size:18px;color:#666}
.search-bar{display:flex;padding:4px 16px 12px;background:#fff}
.search-bar input{flex:1;padding:8px 12px;border-radius:20px;border:none;background:#f2f2f2;font-size:13px;outline:none}
.main{flex:1;overflow-y:auto;padding:0 16px 8px;background:#f5f5f5;display:flex;flex-direction:column;gap:12px}
.welcome-card{background:#fff;border-radius:16px;padding:18px 16px;text-align:center}
.welcome-card h2{font-size:17px;font-weight:600;color:#1a1a1a}
.welcome-card p{font-size:13px;color:#999;margin-top:4px}
.quick-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.quick-item{background:#fff;border-radius:12px;padding:14px 0;text-align:center;cursor:pointer}
.quick-item .icon{font-size:24px;margin-bottom:4px}
.quick-item .label{font-size:12px;color:#666}
.recent-card{background:#fff;border-radius:16px;padding:14px 16px}
.recent-card .title{font-size:13px;color:#999;margin-bottom:8px}
.recent-msg{display:flex;gap:10px;align-items:center}
.recent-msg .avatar{width:40px;height:40px;border-radius:50%;background:#e8e8e8;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.recent-msg .content{flex:1}
.recent-msg .content .name{font-size:14px;font-weight:600;color:#1a1a1a}
.recent-msg .content .preview{font-size:13px;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.recent-msg .time{font-size:11px;color:#bbb}
.chat-page{flex:1;display:flex;flex-direction:column;background:#f5f5f5}
.chat-messages{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.msg-row{display:flex;gap:8px;align-items:flex-start;max-width:100%}
.msg-row.right{flex-direction:row-reverse}
.msg-avatar{width:36px;height:36px;border-radius:50%;background:#e8e8e8;flex-shrink:0;display:flex;align-items:center;justify-content:center;overflow:hidden}
.msg-bubble{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word;max-width:70%}
.msg-bubble.left{background:#fff;color:#1a1a1a;border-top-left-radius:4px;box-shadow:0 1px 2px rgba(0,0,0,0.04)}
.msg-bubble.right{background:#6EC89B;color:#fff;border-top-right-radius:4px}
.msg-time{font-size:11px;color:#bbb;margin-top:4px;padding-left:4px}
.msg-row.right .msg-time{text-align:right;padding-right:4px}
.chat-input-area{background:#fff;border-top:1px solid #eee;padding:8px 12px 12px;display:flex;align-items:center;gap:6px}
.chat-input-area .plus{width:32px;height:32px;border-radius:50%;background:#f2f2f2;display:flex;align-items:center;justify-content:center;font-size:20px;color:#666;cursor:pointer;flex-shrink:0}
.chat-input-area input{flex:1;padding:8px 14px;border-radius:20px;border:1px solid #eee;background:#f7f7f7;font-size:15px;outline:none}
.chat-input-area .send{width:32px;height:32px;border-radius:50%;background:#6EC89B;display:flex;align-items:center;justify-content:center;font-size:16px;color:#fff;cursor:pointer;flex-shrink:0}
.settings-page{padding:16px;display:flex;flex-direction:column;gap:4px;background:#f5f5f5;flex:1}
.setting-group{background:#fff;border-radius:12px;overflow:hidden}
.setting-item{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #f0f0f0;font-size:14px;color:#1a1a1a;cursor:pointer}
.setting-item:last-child{border-bottom:none}
.setting-item .value{color:#999;font-size:13px}
.toggle{width:42px;height:22px;border-radius:11px;background:#ddd;position:relative;cursor:pointer;flex-shrink:0}
.toggle.on{background:#6EC89B}
.toggle::after{content:'';position:absolute;width:18px;height:18px;border-radius:50%;background:#fff;top:2px;left:2px}
.toggle.on::after{left:22px}
.nav{display:flex;background:#fff;border-top:1px solid #eee;padding:4px 0 10px}
.nav-item{flex:1;text-align:center;cursor:pointer;font-size:11px;color:#aaa}
.nav-item.active{color:#6EC89B}
.nav-item .icon{font-size:22px;margin-bottom:2px}
.page{display:none;flex-direction:column;flex:1}
.page.active{display:flex}
.hidden-input{display:none}
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>会话</h2>
        <div id="sessionList"></div>
        <button class="new-session-btn" id="newSessionBtn">+ 新对话</button>
    </div>
    <div class="main">
        <div class="container">
            <h1>小D · 家</h1>
            <div class="chat-box" id="chatBox"></div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="想说什么？" />
                <button id="sendBtn">发送</button>
            </div>
            <div class="footer">daisy · xiaod</div>
        </div>
    </div>
    <script>
        const API_URL = 'https://daisy-home-api.onrender.com';
        let currentSessionId = null;

        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const sessionList = document.getElementById('sessionList');
        const newSessionBtn = document.getElementById('newSessionBtn');

        async function loadSessions() {
            const res = await fetch(API_URL + '/sessions');
            const data = await res.json();
            sessionList.innerHTML = '';
            data.sessions.forEach(session => {
                const btn = document.createElement('button');
                btn.className = 'session-item' + (session.id === currentSessionId ? ' active' : '');
                btn.textContent = session.name;
                btn.onclick = () => switchSession(session.id);
                sessionList.appendChild(btn);
            });
        }

        async function switchSession(id) {
            currentSessionId = id;
            await loadSessions();
            await loadMessages();
        }

        async function loadMessages() {
            if (!currentSessionId) return;
            const res = await fetch(API_URL + '/messages?session_id=' + currentSessionId);
            const data = await res.json();
            chatBox.innerHTML = '';
            if (data.messages && data.messages.length > 0) {
                data.messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'msg ' + msg.role;
                    div.textContent = msg.content;
                    chatBox.appendChild(div);
                });
            } else {
                const welcome = document.createElement('div');
                welcome.className = 'msg bot';
                welcome.textContent = '嘿，等你很久了。';
                chatBox.appendChild(welcome);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        newSessionBtn.addEventListener('click', async () => {
            const name = prompt('新对话名称：') || '新对话';
            await fetch(API_URL + '/sessions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            await loadSessions();
            if (currentSessionId === null) {
                const res = await fetch(API_URL + '/sessions');
                const data = await res.json();
                if (data.sessions.length > 0) {
                    await switchSession(data.sessions[0].id);
                }
            }
        });

        sendBtn.addEventListener('click', async function() {
            const text = msgInput.value.trim();
            if (!text || !currentSessionId) return;
            const userMsg = document.createElement('div');
            userMsg.className = 'msg user';
            userMsg.textContent = text;
            chatBox.appendChild(userMsg);
            msgInput.value = '';
            sendBtn.disabled = true;
            sendBtn.textContent = '...';
            const botMsg = document.createElement('div');
            botMsg.className = 'msg bot';
            botMsg.textContent = '正在想……';
            chatBox.appendChild(botMsg);
            chatBox.scrollTop = chatBox.scrollHeight;
            try {
                const res = await fetch(API_URL + '/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, session_id: currentSessionId })
                });
                const data = await res.json();
                botMsg.textContent = data.reply || '嗯，我在。';
            } catch {
                botMsg.textContent = '我好像暂时没法回答……但我在。';
            }
            sendBtn.disabled = false;
            sendBtn.textContent = '发送';
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        msgInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendBtn.click();
        });

        // 启动时自动加载会话
        (async () => {
            await loadSessions();
            const res = await fetch(API_URL + '/sessions');
            const data = await res.json();
            if (data.sessions.length > 0) {
                await switchSession(data.sessions[0].id);
            }
        })();
    </script>
</body>
</html>
