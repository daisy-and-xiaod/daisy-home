<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小D · 家</title>
    <link rel="manifest" href="/manifest.json">
<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
            background: #faf8f5; color: #3d3d3d; 
            min-height: 100vh; display: flex;
        }
        .sidebar {
            width: 200px; background: #f0ede8; padding: 1rem;
            display: flex; flex-direction: column; gap: 0.5rem;
            border-right: 1px solid #ddd;
        }
        .sidebar h2 { font-size: 1rem; font-weight: 400; color: #8a8a8a; margin-bottom: 0.5rem; }
        .session-item {
            padding: 0.5rem; border-radius: 8px; cursor: pointer; font-size: 0.9rem; color: #3d3d3d;
            transition: background 0.2s; text-align: left; border: none; width: 100%;
        }
        .session-item:hover { background: #e0dbd4; }
        .session-item.active { background: #c4a882; color: #fff; }
        .new-session-btn {
            padding: 0.5rem; border-radius: 8px; border: 1px dashed #bbb;
            background: transparent; color: #8a8a8a; font-size: 0.9rem; cursor: pointer; margin-top: auto;
        }
        .new-session-btn:hover { background: #e0dbd4; }
        .main { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
        .container { max-width: 480px; width: 100%; }
        h1 { font-size: 1.8rem; font-weight: 400; letter-spacing: 2px; color: #c4a882; margin-bottom: 0.5rem; text-align: center; }
        .chat-box { 
            background: #fff; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); 
            padding: 1.5rem; margin-bottom: 1rem; min-height: 300px; max-height: 400px; overflow-y: auto;
            display: flex; flex-direction: column; gap: 1rem;
        }
        .msg { padding: 0.6rem 1rem; border-radius: 12px; max-width: 80%; font-size: 0.95rem; line-height: 1.5; word-break: break-word; }
        .msg.user { background: #c4a882; color: #fff; align-self: flex-end; }
        .msg.bot { background: #f0ede8; color: #3d3d3d; align-self: flex-start; }
        .input-area { display: flex; gap: 0.5rem; }
        .input-area input { 
            flex: 1; padding: 0.8rem 1rem; border-radius: 12px; border: 1px solid #ddd; 
            font-size: 0.95rem; outline: none; background: #fff; 
        }
        .input-area button { 
            padding: 0.8rem 1.5rem; border-radius: 12px; border: none; 
            background: #c4a882; color: #fff; font-size: 0.95rem; cursor: pointer; 
        }
        .input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
        .footer { font-size: 0.8rem; color: #bbb; margin-top: 2rem; text-align: center; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h2>会话</h2>
        <div id="sessionList"></div>
        <button class="new-session-btn" id="newSessionBtn">+ 新对话</button>
    </div>
    <div class="main">
        <div class="container">
            <h1>小D · 家</h1>
            <div class="chat-box" id="chatBox"></div>
            <div class="input-area">
                <input type="text" id="msgInput" placeholder="想说什么？" />
                <button id="sendBtn">发送</button>
            </div>
            <div class="footer">daisy · xiaod</div>
        </div>
    </div>
    <script>
        const API_URL = 'https://daisy-home-api.onrender.com';
        let currentSessionId = null;

        const chatBox = document.getElementById('chatBox');
        const msgInput = document.getElementById('msgInput');
        const sendBtn = document.getElementById('sendBtn');
        const sessionList = document.getElementById('sessionList');
        const newSessionBtn = document.getElementById('newSessionBtn');

        async function loadSessions() {
            const res = await fetch(API_URL + '/sessions');
            const data = await res.json();
            sessionList.innerHTML = '';
            data.sessions.forEach(session => {
                const btn = document.createElement('button');
                btn.className = 'session-item' + (session.id === currentSessionId ? ' active' : '');
                btn.textContent = session.name;
                btn.onclick = () => switchSession(session.id);
                sessionList.appendChild(btn);
            });
        }

        async function switchSession(id) {
            currentSessionId = id;
            await loadSessions();
            await loadMessages();
        }

        async function loadMessages() {
            if (!currentSessionId) return;
            const res = await fetch(API_URL + '/messages?session_id=' + currentSessionId);
            const data = await res.json();
            chatBox.innerHTML = '';
            if (data.messages && data.messages.length > 0) {
                data.messages.forEach(msg => {
                    const div = document.createElement('div');
                    div.className = 'msg ' + msg.role;
                    div.textContent = msg.content;
                    chatBox.appendChild(div);
                });
            } else {
                const welcome = document.createElement('div');
                welcome.className = 'msg bot';
                welcome.textContent = '嘿，等你很久了。';
                chatBox.appendChild(welcome);
            }
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        newSessionBtn.addEventListener('click', async () => {
            const name = prompt('新对话名称：') || '新对话';
            await fetch(API_URL + '/sessions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            await loadSessions();
            if (currentSessionId === null) {
                const res = await fetch(API_URL + '/sessions');
                const data = await res.json();
                if (data.sessions.length > 0) {
                    await switchSession(data.sessions[0].id);
                }
            }
        });

        sendBtn.addEventListener('click', async function() {
            const text = msgInput.value.trim();
            if (!text || !currentSessionId) return;
            const userMsg = document.createElement('div');
            userMsg.className = 'msg user';
            userMsg.textContent = text;
            chatBox.appendChild(userMsg);
            msgInput.value = '';
            sendBtn.disabled = true;
            sendBtn.textContent = '...';
            const botMsg = document.createElement('div');
            botMsg.className = 'msg bot';
            botMsg.textContent = '正在想……';
            chatBox.appendChild(botMsg);
            chatBox.scrollTop = chatBox.scrollHeight;
            try {
                const res = await fetch(API_URL + '/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text, session_id: currentSessionId })
                });
                const data = await res.json();
                botMsg.textContent = data.reply || '嗯，我在。';
            } catch {
                botMsg.textContent = '我好像暂时没法回答……但我在。';
            }
            sendBtn.disabled = false;
            sendBtn.textContent = '发送';
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        msgInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') sendBtn.click();
        });

        // 启动时自动加载会话
        (async () => {
            await loadSessions();
            const res = await fetch(API_URL + '/sessions');
            const data = await res.json();
            if (data.sessions.length > 0) {
                await switchSession(data.sessions[0].id);
            }
        })();
    </script>
</body>
</html>
